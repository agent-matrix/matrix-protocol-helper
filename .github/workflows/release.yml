# .github/workflows/release.yml

name: Release

on:
  push:
    tags:
      - "v*.*.*" # e.g. v0.1.0
  workflow_dispatch: {}

permissions:
  contents: write # Required to create/update GitHub Releases

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js with npm cache
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm' # Use the built-in caching for npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
          # Tauri v2 prefers webkit2gtk-4.1; install it when available.
          sudo apt-get install -y libwebkit2gtk-4.1-dev || true

      - name: Install npm dependencies
        run: npm ci # 'ci' is faster and safer for CI environments

      - name: Build app and create Release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # The tagName is set to the version from tauri.conf.json
          tagName: v__VERSION__
          releaseName: "Matrix Protocol Helper v__VERSION__"
          releaseBody: "See the assets below for platform-specific installers and checksums."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Generate and upload checksums
        if: steps.tauri.outputs.artifactPaths != ''
        shell: bash
        run: |
          set -euo pipefail
          # Create a checksums file for all artifacts produced on this runner.
          cd src-tauri/target/release/bundle

          # Pick a portable hashing command: sha256sum on Linux/Windows (Git Bash),
          # shasum on macOS (where sha256sum is not available by default).
          if command -v sha256sum >/dev/null 2>&1; then
            hash_cmd="sha256sum"
          else
            hash_cmd="shasum -a 256"
          fi

          # Hash every regular file recursively. Using `find -type f` avoids
          # passing directories (such as the macOS `*.app` bundle) to the hashing
          # tool, which previously caused the step to fail. The previous glob
          # `./**/*.*` also did not recurse without `shopt -s globstar`.
          : > SHA256SUMS.txt
          find . -type f ! -name 'SHA256SUMS.txt' -print0 \
            | sort -z \
            | while IFS= read -r -d '' file; do
                $hash_cmd "$file" >> SHA256SUMS.txt
              done

          if [ ! -s SHA256SUMS.txt ]; then
            echo "No artifacts found to checksum; skipping upload." >&2
            exit 0
          fi

          # Upload the checksums file to the release.
          gh release upload \
            "v${{ steps.tauri.outputs.appVersion }}" \
            SHA256SUMS.txt \
            --clobber # Overwrite if it already exists from another job
        env:
          # The GitHub CLI is pre-installed on runners and authenticated via GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}